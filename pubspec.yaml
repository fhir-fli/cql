name: cql
description: >-
  Model-independent Clinical Quality Language (CQL) translator + execution
  engine in Dart. No FHIR dependency — a data model is supplied at the
  boundary via the ModelResolver / TerminologyProvider interfaces (FHIR
  bindings live in the fhir_r*_cql packages).
version: 0.1.0-dev.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/cql

environment:
  sdk: ^3.5.0

# Model-independent core: NO fhir_r* dependency. FHIR is supplied at runtime
# through the ModelResolver / TerminologyProvider interfaces, implemented in
# the separate fhir_r4_cql / fhir_r5_cql / fhir_r6_cql binding packages.
dependencies:
  antlr4: ^4.13.2
  collection: ^1.19.1
  http: ^1.6.0
  json_annotation: ^4.12.0
  path: ^1.9.1
  ucum: ^0.9.0
  uuid: ^4.5.3
  xml: ^6.6.1
  xml2json: ^6.2.7

dev_dependencies:
  lints: ^5.1.1
  test: ^1.29.0
