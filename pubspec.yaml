name: cql
description: >-
  Model-independent CQL (Clinical Quality Language) translator and execution
  engine. FHIR-free — data access via ModelResolver; bindings are
  fhir_r4/r5/r6_cql.
version: 0.6.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/cql

topics:
  - cql
  - fhir
  - hl7
  - healthcare
  - interoperability

environment:
  sdk: ^3.5.0

# Model-independent core: NO fhir_r* dependency. FHIR is supplied at runtime
# through the ModelResolver / TerminologyProvider interfaces, implemented in
# the separate fhir_r4_cql / fhir_r5_cql / fhir_r6_cql binding packages.
dependencies:
  antlr4: ^4.13.2
  collection: ^1.19.1
  json_annotation: ^4.12.0
  # 0.9.0 minimum: affine temperature fixes, strict validation, curated
  # barrel.
  ucum: ^0.9.0
  xml2json: ^6.2.7
  yaml: ^3.1.3

dev_dependencies:
  http: ^1.6.0
  path: ^1.9.1
  test: ^1.29.0
  very_good_analysis: ^10.0.0
  xml: ^6.6.1
