include: package:very_good_analysis/analysis_options.yaml
analyzer:
  errors:
    # Match the fhir-fli family lint policy (fhir_r*/analysis_options.yaml).
    avoid_positional_boolean_parameters: ignore
    always_put_required_named_parameters_first: ignore
    document_ignores: ignore
    comment_references: ignore
    avoid_catches_without_on_clauses: ignore
  exclude:
    - lib/src/cql_to_elm/antlr/**   # ANTLR-generated lexer/parser
    - lib/src/cql_to_elm/antlr4/**  # grammar sources / generated artifacts
    - lib/src/model/serializing/model_info/**  # generated ModelInfo data blobs
